name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 测试（Python ${{ matrix.python-version }}）
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: 配置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: 安装开发依赖
        run: pip install -e ".[dev]"

      - name: 代码检查（ruff）
        run: ruff check src/ scripts/ tests/

      - name: 运行测试
        run: pytest tests/ --tb=short -q

  lint-only:
    name: 格式检查（black）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install "black==24.8.0"
      - run: black --check .
