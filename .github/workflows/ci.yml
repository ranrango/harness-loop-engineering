name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 测试（Python ${{ matrix.python-version }}）
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: 配置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: 安装开发依赖
        run: pip install -e ".[dev]"

      - name: 代码检查（ruff）
        run: ruff check src/ scripts/ tests/

      - name: 运行测试
        run: pytest tests/ --tb=short -q

  lint-only:
    name: 格式检查（black）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install "black==24.8.0"
      - run: black --check .

  harness-loop-demo:
    name: Harness/Loop 示例验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装项目
        run: pip install -e .

      - name: 生成 self-contained demo runs
        run: |
          drone-demo-loop --output-root runs/harness-demo --timestamp baseline --profile baseline
          drone-demo-loop --output-root runs/harness-demo --timestamp improved --profile improved
          drone-demo-loop --output-root runs/harness-demo --timestamp regressed --profile regressed

      - name: 比较 demo runs
        run: |
          drone-compare-runs \
            --base-run runs/harness-demo/harness_loop_demo/baseline \
            --candidate-run runs/harness-demo/harness_loop_demo/improved \
            --output runs/harness-demo/comparison.md \
            --json-output runs/harness-demo/comparison.json \
            --fail-on-regression

      - name: 检查 comparison outputs
        run: |
          test -s runs/harness-demo/comparison.md
          test -s runs/harness-demo/comparison.json
          grep -q "Harness Loop Comparison" runs/harness-demo/comparison.md
          grep -q "Loop Decision" runs/harness-demo/comparison.md
          grep -q '"loop_decision"' runs/harness-demo/comparison.json
          grep -q '"status": "IMPROVED"' runs/harness-demo/comparison.json
          grep -q '"passed": true' runs/harness-demo/comparison.json

      - name: 检查 regression gate 会阻止退化候选
        run: |
          if drone-compare-runs \
            --base-run runs/harness-demo/harness_loop_demo/baseline \
            --candidate-run runs/harness-demo/harness_loop_demo/regressed \
            --json-output runs/harness-demo/regressed-comparison.json \
            --fail-on-regression; then
            echo "Expected regression gate to fail for regressed profile"
            exit 1
          fi
          grep -q '"passed": false' runs/harness-demo/regressed-comparison.json
          grep -q '"metric_regression": true' runs/harness-demo/regressed-comparison.json
